---
name: build-conntrackd

on:
  schedule:
    - cron: "0 4 1,15 * *"
  push:
    branches:
      - main
    paths:
      - 'Containerfile.conntrackd'
      - 'assets/conntrackd/**'
      - '.github/workflows/build-conntrackd.yml'

env:
  IMAGE_NAME: ednxzu/conntrackd
  BUILD_PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to container registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_API_USERNAME }}
          password: ${{ secrets.DOCKERHUB_API_TOKEN }}

      - name: Prepare container metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.url=${{ github.event.repository.html_url }}
            org.opencontainers.image.documentation=${{ github.event.repository.html_url }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
          tags: |
            type=raw,value=latest,enable=true

      - name: Build and publish
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.conntrackd
          push: ${{ (github.event_name != 'pull_request') || (env.FORCE_PUBLISH == 'true') }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: ${{ env.BUILD_PLATFORMS }}

  document:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v6

      - name: Dockerhub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_API_USERNAME }}
          password: ${{ secrets.DOCKERHUB_API_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: docs/conntrackd.md
          short-description: "Conntrackd container for connection tracking synchronization"
